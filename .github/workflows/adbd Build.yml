name: adbd Build
permissions:
  contents: write
on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'MANIFEST_URL (if want to use SSH keys, use git@github.com:XXXXX)'
        required: true
        default: 'https://android.googlesource.com/platform/manifest'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: 'android-8.1.0_r93'
      DEVICE_ARCH:
        description: 'DEVICE_ARCH'
        required: true
        default: 'arm'
      DEBUG:
        description: 'Give me a shell to customize my adbd'
        required: true
        default: true
        type: boolean
jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Display Run Parameters
      run: |
        echo "::group::User Environment Variables"
        echo "Manifest URL: ${{ github.event.inputs.MANIFEST_URL }}"
        echo "Manifest Branch: ${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "Device Arch: ${{ github.event.inputs.DEVICE_ARCH }}"
        echo "::endgroup::"
 
    # You might want to Checkout your repo first, but not mandatory
    - name: Check Out
      uses: actions/checkout@v3
    # Cleanup The Actions Workspace Using Custom Composite Run Actions
    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main
      # That's it! Now use your normal steps

    - name: Prepare the environment
  run: |
    sudo apt update
    sudo apt -y upgrade
    sudo dpkg --add-architecture i386
    sudo apt update -y
    sudo apt install -y software-properties-common
    sudo add-apt-repository -y ppa:deadsnakes/ppa
    sudo apt update -y
    sudo apt install -y \
        gperf gcc-multilib g++-multilib \
        libc6-dev:i386 libncurses-dev:i386 \
        libx11-dev libgl1-mesa-dev libxml2-utils \
        xsltproc bc ccache liblz4-tool libsdl1.2-dev \
        libxml2 lzop pngcrush schedtool squashfs-tools \
        imagemagick libbz2-dev lzma ncftp qemu-user-static \
        libssl-dev flex bison \
        libwxgtk3.2-dev \
        libreadline-dev:i386 \
        zlib1g-dev:i386 \
        python2.7
    sudo ln -sf /usr/bin/python2.7 /usr/bin/python
    wget http://archive.ubuntu.com/ubuntu/pool/main/n/ncurses/libncurses5_6.2-0ubuntu2_amd64.deb
    sudo dpkg -i libncurses5_6.2-0ubuntu2_amd64.deb || true
    sudo apt --fix-broken install -y

    - name: Install OpenJDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup SSH Keys
      if: ${{ startsWith(github.event.inputs.MANIFEST_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.5.4
      with:
          ssh-private-key: |
              ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Install repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo
      
    - name: Initialize repo
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
        git config --global user.name "azwhikaru"
        git config --global user.email "azwhikaru+37921907@github.com"
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}
      id: pwd
          
    - name: Repo Sync
      run: |
        repo sync -j$(nproc --all) --force-sync
      working-directory: workspace
      
    - name: Patch adbd_auth_verify
      run: |
        ADB_AUTH_PATH="system/core/adb/adbd_auth.cpp"
        sed -i '/bool adbd_auth_verify([^{]*{/,/^}/ {
            /return/s/.*/    return true;/
        }' "$ADB_AUTH_PATH"

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

#    - name: Switch to Python2
#      run: |
#        sudo apt -y install python
#        sudo rm -rf /usr/bin/python
#        sudo ln -s /usr/bin/python2 /usr/bin/python
#        # sudo ln -s /usr/bin/python3 /usr/bin/python3
#      continue-on-error: true

    - name: Tmate SSH - Customize your adbd
      if: ${{ inputs.DEBUG }}
      uses: mxschmitt/action-tmate@v3
    
    - name: Building adbd
      run: |
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch aosp_${{ github.event.inputs.DEVICE_ARCH }}-eng && make clean && make adbd -j$(nproc --all)
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          workspace/out/target/product/generic/root/sbin/adbd
          workspace/out/target/product/generic/system/bin/adbd
        name: ${{ github.event.inputs.MANIFEST_BRANCH }}-${{ github.event.inputs.DEVICE_ARCH }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Arch: ${{ github.event.inputs.DEVICE_ARCH }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
